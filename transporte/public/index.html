<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./images/logo.png" />
    <title>Solicitaçao</title>
    <link rel="stylesheet" href="style.css">
 
    <!-- HEADER -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch("header.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("header-placeholder").innerHTML = data;
                })
                .catch(error => console.error("Erro ao carregar o header:", error));
        });
    </script>

</head>
<body>

    <div id="header-placeholder"></div>
    
    <div class="container">
        <h1>Solicitação de Transporte</h1>

        <form id="chamadoForm">
            <div class="form-group field-nome">
                <label for="usuario_nome">Seu Nome:</label>
                <input type="text" id="usuario_nome" name="usuario_nome" required>
            </div>

            <div class="form-group field-setor">
                <label for="setor">Setor :</label>
                <select id="setor" name="setor_id" required>
                    <option value="">Selecione o setor</option>
                </select>
            </div>

            <div class="form-group field-destino">
                <label for="Destino">Destino:</label>
                <input type="text" id="destino" name="destino" required>
            </div>

            <div class="form-group field-data">
                <label for="data">Data:</label>
                <input type="date" id="data" name="data" required>
            </div>

            <div class="form-group field-hora">
                <label for="hora">Horário:</label>
                <input type="time" id="hora" name="hora" required>
            </div>

            <button type="submit">Solicitar</button>
        </form>

        <div id="mensagem" class="mensagem"></div>

    </div>

    <script>
        // Carregar setores ao iniciar a página
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Carregar setores
                const responseSetores = await fetch('/api/setores');
                const setores = await responseSetores.json();

                const selectSetor = document.getElementById('setor');
                setores.forEach(setor => {
                    const option = document.createElement('option');
                    option.value = setor.id;
                    option.textContent = setor.nome;
                    selectSetor.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
            }
        });

        // Enviar formulário de chamado
        document.getElementById('chamadoForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const data = {
                usuario_nome: formData.get('usuario_nome'),
                destino: formData.get('destino'),
                hora: formData.get('hora'),
                data: formData.get('data'),
                setor_id: formData.get('setor_id')
            };

            try {
                const response = await fetch('/api/solicitacao', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    document.getElementById('mensagem').textContent = 'Solicitação aberta com sucesso! Aguarde designação do motorista.';
                    document.getElementById('mensagem').className = 'mensagem sucesso';
                    e.target.reset();

                    // Limpar mensagem após 5 segundos
                    setTimeout(() => {
                        document.getElementById('mensagem').textContent = '';
                        document.getElementById('mensagem').className = 'mensagem';
                    }, 5000);
                } else {
                    throw new Error('Erro ao abrir solicitação');
                }
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('mensagem').textContent = 'Erro ao abrir solicitação. Tente novamente.';
                document.getElementById('mensagem').className = 'mensagem erro';
            }
        });
    </script>
</body>

</html>
