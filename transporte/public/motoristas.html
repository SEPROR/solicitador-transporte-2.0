    <!-- HEADER E FOOTER-->

                    document.getElementById("header-placeholder").innerHTML = data;
                })
                .catch(error => console.error("Erro ao carregar o header:", error));

                .then(res => res.text())
                .then(html => {

                });

    </script>

</head>

<body>

    <main>
    <div id="header-placeholder"></div>

    <div class="container">
        <h1>Gerenciar Motorista</h1>
        
        <div class="management-section">
            <h2>Adicionar Novo Motorista</h2>
            <form id="motoristaForm">
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="usuario_login">Usuário de Login:</label>
                    <input type="text" id="usuario_login" name="usuario_login" 
                    placeholder="Deixe em branco para gerar automaticamente">
                </div>
                
                <div class="form-group">
                    <label for="whatsapp">WhatsApp (apenas números):</label>
                    <input type="tel" id="whatsapp" name="whatsapp" pattern="[0-9]{10,11}" 
                           placeholder="11999999999" required>
                    <small>Formato: DDD + número (ex: 11999999999)</small>
                </div>
                
                 <!-- <div class="form-group">
                    <label for="nivel_id">Nível de Atendimento:</label>
                    <select id="nivel_id" name="nivel_id" required> -->
                        <!-- <option value="">Selecione o nível</option>
                     Será preenchido via JavaScript 
               </select>
                </div>  -->
                
                <button type="submit">Adicionar Motorista</button>
            </form>
            
            <div id="mensagemMotorista" class="mensagem"></div>
        </div>
        
        <div class="management-section">
            <h2>Motoristas Cadastrados</h2>
            <div id="listaMotoristas"></div>
        </div>
    </div>

    </main>

    <div id="footer-placeholder"></div>

    <script>
       // Verificar autenticação ao carregar a página
async function verificarAutenticacao() {
    try {
        const response = await fetch('/api/auth/status');
        const data = await response.json();
        
        if (!data.autenticado) {
            window.location.href = '/login.html';
            return;
        }
        
        // Exibir nome do usuário
        if (data.usuario) {
            document.getElementById('userName').textContent = data.usuario;
        }
        
        // Carregar dados após verificar autenticação
        await carregarDados();
        
    } catch (error) {
        console.error('Erro ao verificar autenticação:', error);
        window.location.href = '/login.html';
    }
}

// Função de logout
async function fazerLogout() {
    try {
        const response = await fetch('/api/logout', {
            method: 'POST'
        });
        
        const data = await response.json();
        
        if (data.success) {
            window.location.href = '/login.html';
        } else {
            alert('Erro ao fazer logout. Tente novamente.');
        }
        
    } catch (error) {
        console.error('Erro no logout:', error);
        alert('Erro ao fazer logout. Tente novamente.');
    }
}

// Carregar níveis de técnico e técnicos
async function carregarDados() {
    try {
        // //Carregar níveis
        // const responseNiveis = await fetch('/api/nivel-tecnico');
        // const niveis = await responseNiveis.json();
        
        // const selectNivel = document.getElementById('nivel_id');
        // selectNivel.innerHTML = '<option value="">Selecione o nível</option>';
        // niveis.forEach(nivel => {
        //      const option = document.createElement('option');
        //      option.value = nivel.id;
        //      option.textContent = `${nivel.nome} (${nivel.descricao})`;
        //      selectNivel.appendChild(option);
        //  });
        
        // Carregar técnicos
        await carregarMotoristas(); 
    } catch (error) {
        console.error('Erro ao carregar dados:', error);
    }
}

// Carregar técnicos
async function carregarMotoristas() { 
    try {
        const response = await fetch('/api/motoristas/todos');
        const motoristas = await response.json();
        
        // Carregar níveis para exibir informações completas
        // const responseNiveis = await fetch('/api/nivel-tecnico');
        // const niveis = await responseNiveis.json();
        // const niveisMap = {};
        // niveis.forEach(nivel => {
        //     niveisMap[nivel.id] = nivel;
        // });
        
        const listaMotoristas = document.getElementById('listaMotoristas');
        listaMotoristas.innerHTML = '';
        
        if (motoristas.length === 0) {
            listaMotoristas.innerHTML = '<p>Nenhum motorista cadastrado.</p>';
            return;
        }
        
        motoristas.forEach(motorista => {
            // const nivelInfo = niveisMap[motorista.nivel_id] || {};
            // const nivelClass = nivelInfo.codigo_acesso ? `nivel-${nivelInfo.codigo_acesso.toLowerCase()}` : '';
            
            const motoristaElement = document.createElement('div');
            motoristaElement.className = `item-lista ${motorista.ativo ? '' : 'inativo'}`;
            
            motoristaElement.innerHTML = `
                <div class="item-info">
                    <h3>${motorista.nome} ${motorista.ativo ? '' : '<span class="status-badge">Inativo</span>'}</h3>
                    <p>WhatsApp: ${formatarWhatsApp(motorista.whatsapp)}</p>
                    <p>Usuário: ${motorista.usuario_login || 'Não definido'}</p>
                </div>
                
                <div class="item-acoes">
                    ${motorista.whatsapp ? `<a href="https://wa.me/55${motorista.whatsapp}" target="_blank" class="whatsapp-btn">💬 WhatsApp</a>` : ''}
                    <button onclick="editarMotorista(${motorista.id}, '${motorista.nome}', '${motorista.whatsapp}', ${motorista.nivel_id}, ${motorista.ativo}, '${motorista.usuario_login || ''}')">Editar</button>
                    ${motorista.ativo ? `<button onclick="excluirMotorista(${motorista.id})">Excluir</button>` : ''}
                </div>
            `;
            
            listaMotoristas.appendChild(motoristaElement);
        });
    } catch (error) {
        console.error('Erro ao carregar motorista:', error);
    }
}

// Formatador de WhatsApp
function formatarWhatsApp(numero) {
    if (!numero) return 'Não informado';
    // Formato: (11) 99999-9999
    const ddd = numero.substring(0, 2);
    const parte1 = numero.substring(2, 7);
    const parte2 = numero.substring(7);
    return `(${ddd}) ${parte1}-${parte2}`;
}

// Adicionar novo técnico
document.getElementById('motoristaForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    const data = {
        nome: formData.get('nome'),
        whatsapp: formData.get('whatsapp').replace(/\D/g, ''), // Remove não-números
        // nivel_id: formData.get('nivel_id'),
        usuario_login: formData.get('usuario_login') || null
    };
    
    try {
        const response = await fetch('/api/motoristas', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            document.getElementById('mensagemMotorista').textContent = 'Técnico adicionado com sucesso!';
            document.getElementById('mensagemMotorista').className = 'mensagem sucesso';
            e.target.reset();
            carregarMotoristas();
            
            setTimeout(() => {
                document.getElementById('mensagemMotorista').textContent = '';
                document.getElementById('mensagemMotorista').className = 'mensagem';
            }, 3000);
        } else {
            const error = await response.json();
            throw new Error(error.error || 'Erro ao adicionar técnico');
        }
    } catch (error) {
        console.error('Erro:', error);
        document.getElementById('mensagemMotorista').textContent = error.message;
        document.getElementById('mensagemMotorista').className = 'mensagem erro';
    }
});

// Editar técnico
async function editarMotorista(id, nome, whatsapp, ativo, usuario_login) {
    // Carregar níveis para o prompt
    // const responseNiveis = await fetch('/api/nivel-tecnico');
    // const niveis = await responseNiveis.json();
    
    // let niveisTexto = 'Níveis disponíveis:\n';
    // niveis.forEach((nivel, index) => {
    //     niveisTexto += `${index + 1}. ${nivel.codigo_acesso} - ${nivel.descricao}\n`;
    // });
    
    const novoNome = prompt('Editar nome do Motorista:', nome);
    if (novoNome === null) return;
    
    const novoWhatsapp = prompt('Editar WhatsApp (apenas números, ex: 11999999999):', whatsapp);
    if (novoWhatsapp === null) return;
    
    const novoUsuarioLogin = prompt('Editar usuário de login:', usuario_login || '');
    if (novoUsuarioLogin === null) return;
    
    // const nivelEscolha = prompt(`${niveisTexto}\nDigite o número do novo nível (1-${niveis.length}):`, 
    //                         niveis.findIndex(n => n.id === nivel_id) + 1);
    // if (nivelEscolha === null) return;
    
    // const novoNivelId = niveis[parseInt(nivelEscolha) - 1]?.id || nivel_id;
    const novoAtivo = confirm('Motorista está ativo?');
    
    fetch(`/api/motoristas/${id}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            nome: novoNome,
            whatsapp: novoWhatsapp.replace(/\D/g, ''),
            // nivel_id: novoNivelId,
            ativo: novoAtivo,
            usuario_login: novoUsuarioLogin
        })
    })
    .then(response => response.json())
    .then(data => {
        alert('Motorista atualizado com sucesso!');
        carregarMotoristas();
    })
    .catch(error => {
        console.error('Erro:', error);
        alert('Erro ao atualizar motorista.');
    });
}
// Excluir técnico
function excluirMotorista(id) {
    if (!confirm('Tem certeza que deseja excluir este motorista?')) return;
    
    fetch(`/api/motoristas/${id}`, {
        method: 'DELETE'
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            alert('Técnico excluído com sucesso!');
            carregarMotoristas();
        }
    })
    .catch(error => {
        console.error('Erro:', error);
        alert('Erro ao excluir motorista.');
    });
}

// Verificar autenticação quando a página carregar
document.addEventListener('DOMContentLoaded', verificarAutenticacao);
    </script>
