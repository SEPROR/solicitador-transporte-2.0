<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header SEPROR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            
            <div class="header-left">
                <img src="images/secretaria.png" alt="Governo do Estado do Amazonas" class="gov-logo-img">
            </div>

            <nav class="header-center">
                <div class="nav-item">
                    <button class="nav-btn">
                        Gerenciamento <span class="arrow-down"></span>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a href="#">Opção 1</a></li>
                        <li><a href="#">Opção 2</a></li>
                    </ul>
                </div>
                
                <div class="nav-item">
                    <button class="nav-btn">
                        Menu <span class="arrow-down"></span>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a href="#">Configurações</a></li>
                        <li><a href="#">Sair</a></li>
                    </ul>
                </div>
            </nav>

            <div class="header-right">
                <img src="images/seprorazul.png" alt="Secretaria de Produção Rural" class="sepror-logo-img">
            </div>

        </div>
    </header>

</body>
</html>
